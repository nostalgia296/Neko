name: Update Rolling Draft Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate_gradle_wrapper:
    name: Validate Gradle Wrapper
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v6

  build_test_and_release:
    name: Build and Update Draft Release
    needs: validate_gradle_wrapper
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android Build Tools
        run: echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;29.0.3"

      - name: Setup Gradle and Enable Caching
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-disabled: true

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICE_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "GOOGLE_SERVICE_JSON secret is empty. Using mock google-services.json"
            cat << 'EOF' > app/google-services.json
          {
            "project_info": {
              "project_number": "1234567890",
              "project_id": "dummy"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:1234567890:android:1234567890",
                  "android_client_info": {
                    "package_name": "org.nekomanga.neko"
                  }
                },
                "api_key": [
                  {
                    "current_key": "dummy"
                  }
                ]
              }
            ]
          }
          EOF
          else
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
          fi

      - name: Build App
        run: ./gradlew assembleStandardRelease

      - name: Sign APKs
        id: sign_app
        if: ${{ env.SIGNING_KEY != '' }}
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/standard/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Prepare Release Artifacts and Checksums
        id: prep_artifacts
        run: |
          RELEASE_DIR="app/build/outputs/apk/standard/release"
          echo "--- Files in release directory ---"
          ls -l "$RELEASE_DIR"
          echo "------------------------------------"
          # Move and rename the files using the correct path.
          # Match either unsigned or signed APKs
          mv "$RELEASE_DIR"/*universal-release*.apk neko-universal.apk
          mv "$RELEASE_DIR"/*arm64-v8a-release*.apk neko-arm64-v8a.apk
          mv "$RELEASE_DIR"/*armeabi-v7a-release*.apk neko-armeabi-v7a.apk
          mv "$RELEASE_DIR"/*x86-release*.apk neko-x86.apk
          mv "$RELEASE_DIR"/*x86_64-release*.apk neko-x86_64.apk
          {
            echo 'sha_table<<EOF'
            echo ""
            echo "### Downloads & Checksums"
            echo "| Variant     | SHA-256 Checksum |"
            echo "|:------------|:-----------------|"
            for apk in *.apk; do
            variant=$(echo "$apk" | sed -e 's/neko-//' -e 's/.apk//')
            checksum=$(sha256sum "$apk" | awk '{ print $1 }')
            echo "| \`$variant\` | \`$checksum\` |"
            done
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Get previous release
        id: last_release
        uses: pozetroninc/github-action-get-latest-release@master
        with:
          repository: 'nekomangaorg/Neko'
          excludes: 'prerelease,draft'
          token: ${{ secrets.GITHUB_TOKEN }}


      - name: Update GitHub Draft Release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          generateReleaseNotes: false
          body: |
            ${{ steps.prep_artifacts.outputs.sha_table }}
          draft: true
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "*.apk"
